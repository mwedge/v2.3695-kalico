[filament_switch_sensor runout_sensor]
pause_on_runout: True
switch_pin: ^PG12           # Blue wire to STOP_4
runout_gcode:
    M117 Filament runout detected
    PAUSE
insert_gcode:
    M117 Filament inserted

[filament_motion_sensor clog_detector]
extruder: extruder
detection_length: 3
switch_pin: ^PG13           # Green wire to STOP_5
pause_on_runout: True
runout_gcode:
    M117 Filament clog/tangle detected
    PAUSE
insert_gcode:
    M117 Filament motion restored
