#####################################################################
#   Z Stepper Settings
#####################################################################

##  Z0 Stepper - Front Left
##  Connected to MOTOR_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
full_steps_per_rotation: 200      # 1.8 degree LDO-42STH48-2004AC
endstop_pin: probe:z_virtual_endstop # Uses Beacon Contact for homing
position_max: 310                 # Adjusted for 350mm build height
position_min: -5                  # Allows Beacon to move below 0 for contact/calibration
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: False
run_current: 0.8                  # LDO-42STH48-2004AC rated for 2.0A
sense_resistor: 0.110
stealthchop_threshold: 0          # Always 0 for Z on a Voron to ensure torque

##  Z1 Stepper - Rear Left
##  Connected to MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: !PC1                     # Note the direction inversion (!) for rear motors
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 Stepper - Rear Right
##  Connected to MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z3 Stepper - Front Right
##  Connected to MOTOR_5
[stepper_z3]
step_pin: PC13
dir_pin: !PF0                     # Note the direction inversion (!)
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   TMC Autotune Extension
#####################################################################

[autotune_tmc stepper_z]
motor: ldo-42sth48-2004ac
[autotune_tmc stepper_z1]
motor: ldo-42sth48-2004ac
[autotune_tmc stepper_z2]
motor: ldo-42sth48-2004ac
[autotune_tmc stepper_z3]
motor: ldo-42sth48-2004ac

#####################################################################
#   Gantry Alignment & Probing
#####################################################################

[quad_gantry_level]
##  Gantry Corners for 350mm Build
gantry_corners:
   -60,-10
   410,420
##  Probe points for 350mm Build
points:
   50,25
   50,275
   300,275
   300,25
speed: 300                        # Travel speed between points
horizontal_move_z: 10             # Height Beacon lifts between points
retries: 5                        # Number of attempts to reach tolerance
#retry_tolerance: 0.0075           # High precision for a CoreXY
retry_tolerance: 0.0150           # High precision for a CoreXY
max_adjust: 10                    # Max correction applied per run
