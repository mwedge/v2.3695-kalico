
[include mainsail.cfg]
[include mcu.cfg]
[include xy_steppers.cfg]
[include z_steppers.cfg]
[include nitehawk-36.cfg]
[include toolhead.cfg]
#[include bed.cfg]
[include sensors_fans.cfg]
[include max.cfg]
[include sfs2.cfg]
[include homing.cfg]
[include macros.cfg]

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 8000
minimum_cruise_ratio: 0.5
max_z_velocity: 10
max_z_accel: 350
square_corner_velocity: 5.0

[force_move]
enable_force_move: True

[idle_timeout]
timeout: 2700
gcode:
    RESPOND MSG="Idle timeout reached"
    TURN_OFF_HEATERS
    M84

[input_shaper]
# Supported shapers: zv, mzv, zvd, ei, 2hump_ei, 3hump_ei
shaper_freq_x: 66.0
shaper_type_x: mzv
damping_ratio_x: 0.076
shaper_freq_y: 40.0
shaper_type_y: mzv
damping_ratio_y: 0.045


[bed_mesh]
speed: 350                       # Fast travel speed between mesh points
horizontal_move_z: 2             # Beacon is safe to stay very close to the bed
mesh_min: 25, 25                 # Standard safe margin for a 350mm bed
mesh_max: 325, 325               # Adjust if your nozzle/probe offset allows more reach
probe_count: 31, 31              # High density; Beacon handles this in one quick pass
algorithm: bicubic               # Required for mesh densities higher than 5x5
bicubic_tension: 0.2
fade_start: 0.6
fade_end: 10.0
fade_target: 0
split_delta_z: .025
move_check_distance: 3
mesh_pps: 2, 2                   # Interpolated points between actual samples
zero_reference_position: 175, 175 


[shaketune]
result_folder: ~/printer_data/config/shaketune_results
# The folder where your .png and .csv files will be saved
number_of_results_to_keep: 6
keep_raw_data: False
show_macros_in_webui: True
timeout: 300

