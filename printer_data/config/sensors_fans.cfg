[thermistor NTC-10K_ldo]
temperature1: 0.0
resistance1: 32116.0
temperature2: 40.0
resistance2: 5309.0
temperature3: 80.0
resistance3: 1228.0

[temperature_sensor Octopus]
sensor_type = temperature_mcu
min_temp = 0
max_temp = 90

[temperature_sensor RaspberryPi]
sensor_type: temperature_host

#[temperature_sensor Chamber]
#sensor_type: ATC Semitec 104GT-2
#sensor_pin: PF6                # Octopus T1

[temperature_sensor Frame]
sensor_type: NTC-10K_ldo
sensor_pin: PF7                # Octopus T2

[controller_fan controller_fan]
pin: PD13
kick_start_time: 0.5
fan_speed: 1.0
idle_timeout: 60

#####################################################################
# 	Chamber Temperature Control (Bed Fans)
#####################################################################

[temperature_fan Chamber]
pin: PD14                      # Bed Fan header 
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
cycle_time: 0.010
off_below: 0.1

# Dedicated Thermistor (Back-Right Gantry near A-motor)
sensor_type: ATC Semitec 104GT-2
sensor_pin: PF6                # Octopus T1 
min_temp: 0
max_temp: 70
target_temp: 0                 # Default to OFF

# PID Control Settings
# NOTE: Run PID_CALIBRATE HEATER=Chamber TARGET=50 to tune these!
control: pid
pid_Kp: 40.0
pid_Ki: 2.0
pid_Kd: 0.5

