# Motor B (Left) - Connected to MOTOR_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: 0
position_endstop: 347
position_max: 347
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PC4                   # The former UART pin becomes the CS pin
spi_bus: spi1                 # Hardware SPI bus on Octopus Pro
diag1_pin: ^!PG6              # Pin for sensorless homing (Note the ! inversion)
interpolate: True
run_current: 2.4              # High torque for your 350mm/s travels
sense_resistor: 0.075         # Standard for 5160 Pro modules
home_current: 0.9             # Reliable current for homing
current_change_dwell_time: 0.5
stealthchop_threshold: 0

# Motor A (Right) - Connected to MOTOR_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: 0
position_endstop: 356
position_max: 356
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PD11                  # Unique CS pin for Motor 1
spi_bus: spi1
diag1_pin: ^!PG9
interpolate: True
run_current: 2.4
sense_resistor: 0.075
home_current: 0.9
current_change_dwell_time: 0.5
stealthchop_threshold: 0

# --- TMC Autotune Section ---
# This is where you TUNE your sensorless sensitivity now
[autotune_tmc stepper_x]
motor: ldo-42sth48-2804ah
tuning_goal: performance
sgt: 2                      # 5160 Sensitivity: -64 (most) to 63 (least)
voltage: 24

[autotune_tmc stepper_y]
motor: ldo-42sth48-2804ah
tuning_goal: performance
sgt: 2
voltage: 24
