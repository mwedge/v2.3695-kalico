#    G92 E0                        # Reset Extruder
#    G1 Z2.0 F3000                 # Move Z up

[gcode_macro PURGE_LINE]
gcode:
    # --- 1. Settings ---
    {% set start_x = params.START_X|default(5)|float %}      # Near left edge
    {% set start_y = params.START_Y|default(5)|float %}      # Near front edge
    {% set line_length = params.LINE_LENGTH|default(50)|float %}
    {% set purge_amount = params.PURGE_AMOUNT|default(30)|float %}
    {% set flow_rate = 12 %}                                # mm3/s target
    

    # Speed Settings
    {% set travel_speed = 5000 %}
    {% set purge_speed = 150 %}   
    {% set line_height = 0.3 %}

    # --- 2. Positioning ---
    M118 Purging...
    G90                               # Absolute positioning
    G1 Z5 F3000                       # Lift
    G1 X{start_x} Y{start_y} F18000    # Move to start
    G1 Z{line_height} F1500           # Lower to bed

    # --- 3. The Purge ---
    G92 E0                            # Reset Extruder
    M83                               # Relative Extrusion
    
    # Pre-prime the nozzle slightly to build pressure
    G1 E10 F300                        
    
    # Draw the line
    # Draws in the Y direction (along the left edge of your 350mm bed)
    G1 Y{start_y + line_length} E{purge_amount} F{purge_speed}

    # --- 4. Clean Up ---
    G92 E0
    G1 E-0.5 F2100                    # Small retraction
    G1 Z3 F3000                       # Z-Hop
    G90                               # Back to absolute
    M400                              # Wait for moves to finish

[gcode_macro CLEANUP_AIR]
gcode:
    # This macro keeps the Nevermore running until the bed is safe
    SET_FAN_SPEED FAN=nevermore SPEED=1
    
    # Wait until the bed temperature drops below 60C
    # This prevents the "VOC bloom" when you open the door.
    TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM=60
    
    SET_FAN_SPEED FAN=nevermore SPEED=0
    M118 Bed Cool. Print Finished.

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  50         # Distance from extruder gears to melt zone
variable_purge_distance: 60         # Amount to purge to clear old color
variable_load_speed:     1800       # Fast feed speed (30mm/s)
variable_purge_speed:    300        # Slow purge speed (5mm/s)

gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}
    
    SAVE_GCODE_STATE NAME=load_state
    M118 Loading Filament...
    
    # 1. Heat up if necessary
    {% if printer.extruder.temperature < 200 %}
        M118 Heating to {EXTRUDER_TEMP}C...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 2. The Load Sequence
    G91                             # Relative positioning
    G92 E0                          # Reset extruder
    
    # Rapid feed through the heatbreak
    M118 Feeding...
    G1 E{load_distance} F{load_speed} 
    
    # Slow purge to prime the nozzle
    M118 Purging...
    G1 E{purge_distance} F{purge_speed}
    
    # Small retract to prevent ooze after loading
    G1 E-1 F3000
    
    G90                             # Absolute positioning
    RESTORE_GCODE_STATE NAME=load_state
    M118 Load Complete
    UPDATE_DELAYED_GCODE ID=clear_display DURATION=5

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}
    
    SAVE_GCODE_STATE NAME=unload_state
    
    # 1. Heat up if necessary
    {% if printer.extruder.temperature < 200 %}
        M118 Heating to {EXTRUDER_TEMP}C...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 2. Tip Shaping & Unload
    # This mirrors your PRINT_END logic for a clean point
    M118 Shaping Tip...
    G91
    G1 E2 F3600                     # Dump
    G1 E-15 F3000                   # Fast pull
    G4 P2000                        # Cool
    G1 E10 F3000                    # Crunch
    G1 E-80 F3000                   # Long retract to clear gears
    
    G90
    RESTORE_GCODE_STATE NAME=unload_state
    M118 Unload Complete

[delayed_gcode clear_display]
gcode:
    M118
