[gcode_macro CLEAN_NOZZLE]
# Brush: 37mm (X89-X126) | 8.25mm (Centered at Y350.5) | 4mm Tall
variable_start_x: 80         # Start 9mm left of bristles
variable_start_y: 350.5      # Primary wipe line (Center-ish of brush)
variable_start_z: 2.95       # ~1mm compression
variable_wipe_dist: 55       # Sweep from X80 to X135
variable_wipe_qty: 3         
variable_wipe_spd: 8000
variable_purge_x: 62
variable_purge_y: 358
variable_purge_z: 10
variable_purge_amount: 40

gcode:
    {% set hot_temp = params.HOT_TEMP|default(250)|float %}
    {% set purge_enabled = params.PURGE|default(1)|int %}

    # --- 1. Position & Heat ---
    G90
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < purge_z %}
        G1 Z{purge_z} F1500
    {% endif %}
    G1 X{purge_x} Y{purge_y} F{wipe_spd}
    G1 Z{purge_z} F1500
    M109 S{hot_temp}

    # --- 2. Purge ---
    {% if purge_enabled == 1 %}
        G92 E0
        G1 E{purge_amount} F300
        G1 E-6.0 F3600              # Vacuum retract to stop ooze
        G4 P2000
    {% endif %}

    # --- 3. Phase A: X-Axis Rectangle (Width Scrub) ---
    M118 Phase A: Side-to-Side (Y350.5 <-> Y347.5)...
    G1 X{start_x} Y{start_y} F{wipe_spd}
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} F{wipe_spd}
        G1 Y{start_y - 3} F{wipe_spd}
        G1 X{start_x} F{wipe_spd}
        G1 Y{start_y} F{wipe_spd}
    {% endfor %}

    # --- 4. The 8s Cooling Pause ---
    M118 Cooling debris (8s pause)...
    M106 S255                       
    G1 Z{start_z + 10} F3000        
    G4 P8000                        
    M106 S0                         

    # --- 5. Phase B: Y-Axis Rectangle (Depth Scrub) ---
    M118 Phase B: Front-to-Back (Y356 <-> Y343)...
    {% set mid_x = 107.5 %}           
    G1 X{mid_x} Y{start_y + 5.5} F{wipe_spd}
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 Y{start_y - 7.5} F{wipe_spd}
        G1 X{mid_x + 4} F{wipe_spd}
        G1 Y{start_y + 5.5} F{wipe_spd}
        G1 X{mid_x} F{wipe_spd}
    {% endfor %}

    # --- 6. The Final Flick (High Clearance) ---
    M118 Final Polish & Flick...
    G1 Z{start_z + 10} F3000        # Lift Z up 10mm for safety
    G4 P5000                        # 5 Second Pause
    
    # RE-ALIGN & DIVE
    G1 X{start_x} Y{start_y} F{wipe_spd}        # Move to X80, Y350.5 (Still at Z+10)
    G1 Z{start_z} F3000                         # Dive back down to brush
    G1 X{start_x + wipe_dist} F15000            # THE FLICK: Fast move across (to X135)
    G1 X{start_x} F15000                        # Return Flick

    # --- 7. Post-Wipe Cooldown ---
    G1 Z{start_z + 20} F3000
    {% if 'SAFE_TEMP' in params %}
        M118 Cooling to {params.SAFE_TEMP}C...
        M106 S255
        M109 S{params.SAFE_TEMP|float}
        M106 S0
    {% endif %}
    M118 Clean Complete
