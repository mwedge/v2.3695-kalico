[gcode_macro PRINT_START]
gcode:
    # --- 1. Fetch Parameters ---
    {% set BED_TEMP = params.BED_TEMP|default(110)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(250)|float %}
    {% set PURGE_TEMP = params.PURGE_TEMP|default(250)|float %}
    {% set COOL_TEMP = params.COOL_TEMP|default(150)|float %} 
    {% set CHAMBER_TEMP = params.CHAMBER|default(50)|float %}
    {% set Z_OFFSET = params.Z_OFFSET|default(0.05)|float %}

    # --- 2. Initial Setup & Heat ---
    M118 Initializing...
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0
    G90
    M140 S{BED_TEMP}
    M118 Initial Homing...
    G28
    
    # --- 3. Chamber Heat Soak & Convection ---
    G0 X175 Y175 Z50 F3600
    M118 Waiting for Bed Temp: {BED_TEMP}C...
    M190 S{BED_TEMP}

    {% if CHAMBER_TEMP > 0 %}
        M118 Chamber Soak: Fans at 100%...
        M106 S255                        # Turn part fans to 100%
        M118 Waiting for Chamber Temp: {CHAMBER_TEMP}C...
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={CHAMBER_TEMP}
        M106 S0                          # Turn fans back off
    {% endif %}

    # --- 4. First Clean (180C, No Purge) ---
    M118 Pre-Calibration Cold Wipe (180C)...
    CLEAN_NOZZLE HOT_TEMP=180 SAFE_TEMP={COOL_TEMP} PURGE=0
    
    M118 Beacon Contact (Cold)...
    G28 Z METHOD=CONTACT CALIBRATE=1 
    QUAD_GANTRY_LEVEL
    G28 Z                            

    # --- 5. Adaptive Mesh (Commented Out) ---
    # M118 Scan Mesh...
    # BED_MESH_CALIBRATE ADAPTIVE=1 RUNS=2 

    # --- 6. Final Clean & Hot Contact (Actual Temp) ---
    M118 Final Prep & Purge...
    # Uses your PURGE_ON parameter (Default 1) to prime for the print
    CLEAN_NOZZLE HOT_TEMP={EXTRUDER_TEMP} PURGE=0

    M118 Beacon Contact (Hot)...
    G28 Z METHOD=CONTACT CALIBRATE=0 
    
    SET_GCODE_OFFSET Z_ADJUST={Z_OFFSET} 

    # --- 7. Print! ---
    PRIME_LINE                    
    M118 Printing...

[gcode_macro PRINT_END]
gcode:
    # --- 1. Parameters & Safety ---
    M400                           # Wait for buffer to clear
    G92 E0                         # Reset extruder
    
    # --- 2. Safe Move ---
    G91                            # Relative positioning
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 22.0) %}
        {% set z_safe = 20.0 %}
    {% else %}
        {% set z_safe = max_z - act_z - 2.0 %}
    {% endif %}
    G1 Z{z_safe} F3000             

    # --- 3. Park ---
    G90                            # Absolute positioning
    G1 X175 Y355 F6000             # Park at Back Center

    # --- 4. Tip Shaping Sequence ---
    # This creates a pointed tip for easier removal/reloading
    M118 Shaping Tip...
    G1 E2 F3600                    # Quick extrude to fill nozzle
    G1 E-15 F3000                  # Fast long retract to pull filament out of melt zone
    G4 P2000                       # Wait 2s for the tip to cool/solidify in the heatbreak
    G1 E10 F3000                   # Quick move back in to "crunch" any thin strings
    G1 E-15 F3000                  # Final long retract to park tip in the cold zone

    # --- 5. Shutdown ---
    
    M104 S0                        # Turn off hotend
    M140 S0                        # Turn off bed
    M106 S0                        # Turn off cooling fan
    
[gcode_macro CLEAN_NOZZLE]
variable_start_x: 89
variable_start_y: 352
variable_start_z: 3.0
variable_wipe_dist: 30
variable_wipe_qty: 6
variable_wipe_spd: 8000
variable_purge_x: 62
variable_purge_y: 358
variable_purge_z: 10
variable_purge_amount: 20

gcode:
    # --- 1. Parameters ---
    {% set hot_temp = params.HOT_TEMP|default(250)|float %}
    {% set purge_enabled = params.PURGE|default(1)|int %}

    # --- 2. Safe Travel ---
    M118 Moving to Purge Position...
    G90
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < purge_z %}
        G1 Z{purge_z} F1500
    {% endif %}
    G1 X{purge_x} Y{purge_y} F{wipe_spd}
    G1 Z{purge_z} F1500

    # --- 3. Heat ---
    M118 Heating to {hot_temp}C...
    M109 S{hot_temp}

    # --- 4. Purge (with 6mm Vacuum Retract) ---
    {% if purge_enabled == 1 %}
        M118 Breaking potential plugs...
        G92 E0
        G1 E-2 F300
        G1 E5 F300
        G92 E0
        M118 Purging {purge_amount}mm...
        G1 E{purge_amount} F300
        G1 E-6.0 F3600              # Siphon break
        G4 P5000
    {% endif %}

    # --- 5. First Wiping Pass (X-Only) ---
    M118 First Wipe Pass...
    G1 X{start_x} Y{start_y} F{wipe_spd}
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} F{wipe_spd}
        G1 X{start_x} F{wipe_spd}
    {% endfor %}

    # --- 6. Active Cooling Pause (8s) ---
    M118 Cooling debris (8s pause)...
    M106 S255                       
    G1 Z{start_z + 10} F3000        
    G1 X{start_x} Y{start_y} F{wipe_spd}
    G4 P8000                        
    M106 S0                         
    
    # --- 7. Second Wiping Pass (Diagonal Forward) ---
    M118 Second Wipe Pass (Diagonal)...
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} Y{start_y - 3} F{wipe_spd}
        G1 X{start_x} Y{start_y} F{wipe_spd}
    {% endfor %}

    # --- 8. THE NEW 5s PAUSE & REPEAT ---
    M118 Final Polish (5s pause)...
    G1 Z{start_z + 5} F3000         # Small lift
    G4 P5000                        # 5 Second Pause
    G1 Z{start_z} F1500             # Return for final scrub
    
    M118 Repeating Diagonal Wipe...
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} Y{start_y - 3} F{wipe_spd}
        G1 X{start_x} Y{start_y} F{wipe_spd}
    {% endfor %}

    # --- 9. Post-Wipe Cooldown ---
    G1 Z{start_z + 20} F3000
    {% if 'SAFE_TEMP' in params %}
        M118 Cooling to {params.SAFE_TEMP}C...
        M106 S255
        M109 S{params.SAFE_TEMP|float}
        M106 S0
    {% endif %}

    M118 Clean Complete

[gcode_macro PRIME_LINE]
gcode:
    # --- 1. Settings ---
    {% set start_x = params.START_X|default(5)|float %}      
    {% set start_y = params.START_Y|default(5)|float %}      
    {% set line_length = params.LINE_LENGTH|default(60)|float %} 
    {% set purge_amount = params.PURGE_AMOUNT|default(40)|float %} # Slightly reduced to be safer
    
    # Speed Settings
    {% set travel_speed = 150 * 60 %}  
    {% set purge_speed = 10 * 60 %}    
    {% set line_height = 0.4 %}        # Increased height to spread the plastic better

    # --- 2. Positioning ---
    M118 Prime line starting...
    G90                               
    G1 Z5 F3000                       
    G1 X{start_x} Y{start_y} F{travel_speed}
    G1 Z{line_height} F1500           

    # --- 3. The Purge ---
    G92 E0                            
    M83                               
    
    # Pre-prime nozzle
    G1 E10 F300
    G4 P2000
    
    # Draw the line
    M118 Drawing Prime line...
    G1 Y{start_y + line_length} E{purge_amount} F{purge_speed}

    # --- 4. Clean Up ---
    G92 E0
    G1 E-0.5 F2100                    
    G1 Z3 F3000                       
    G90                               
    M400                              
    M118 Purge line complete.

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  50         # Distance from extruder gears to melt zone
variable_purge_distance: 60         # Amount to purge to clear old color
variable_load_speed:     1800       # Fast feed speed (30mm/s)
variable_purge_speed:    300        # Slow purge speed (5mm/s)

gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}
    
    SAVE_GCODE_STATE NAME=load_state
    M118 Loading Filament...
    
    # 1. Heat up if necessary
    {% if printer.extruder.temperature < 200 %}
        M118 Heating to {EXTRUDER_TEMP}C...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 2. The Load Sequence
    G91                             # Relative positioning
    G92 E0                          # Reset extruder
    
    # Rapid feed through the heatbreak
    M118 Feeding...
    G1 E{load_distance} F{load_speed} 
    
    # Slow purge to prime the nozzle
    M118 Purging...
    G1 E{purge_distance} F{purge_speed}
    
    # Small retract to prevent ooze after loading
    G1 E-1 F3000
    
    G90                             # Absolute positioning
    RESTORE_GCODE_STATE NAME=load_state
    M118 Load Complete
    UPDATE_DELAYED_GCODE ID=clear_display DURATION=5

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}

    SAVE_GCODE_STATE NAME=unload_state

    # 1. Heat up
    {% if printer.extruder.temperature < 200 %}
        M118 Heating to {EXTRUDER_TEMP}C...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 2. Needle-Tip Shaping
    M118 Shaping Needle Tip...
    G91                              # Relative
    G92 E0
    G1 E2 F3600                      # 1. Quick "Purge" to clear the nozzle tip
    G1 E-18 F3000                    # 2. FAST PULL to the cold zone (The "Snap")
    M106 S255                        # 3. BLAST FANS to freeze the string in mid-air
    G4 P5000                         # 4. WAIT 5s (Crucial for the tip to harden)
    G1 E12 F3000                     # 5. THE "TAP": Move back in slightly (don't "crunch" into the melt)
    G1 E-90 F3000                    # 6. FINAL UNLOAD: Clear the gears
    
    M106 S0                          # Fans off
    G90                              # Absolute
    RESTORE_GCODE_STATE NAME=unload_state
    M118 Unload Complete

[delayed_gcode clear_display]
gcode:
    M118

[gcode_macro PREHEAT]
gcode:
    # --- 1. Parameters ---
    {% set BED_TEMP = params.BED|default(110)|float %}
    {% set CHAMBER_TEMP = params.CHAMBER|default(50)|float %}

    # --- 2. Initial Homing ---
    # We home first to ensure the toolhead knows where the center is
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # --- 3. Set Temps & Fans ---
    M118 Preheating: Bed {BED_TEMP}C, Chamber {CHAMBER_TEMP}C...
    M140 S{BED_TEMP}                 # Start heating bed
    M106 S255                        # Part fans to 100% for convection

    # --- 4. Park in Center ---
    G90                              # Absolute positioning
    G1 X175 Y175 Z50 F6000           # Park at center @ Z50
    
    # --- 5. Notification ---
    # We leave the fans on so the heat stays even until you start the print
    M118 Preheat Started.

