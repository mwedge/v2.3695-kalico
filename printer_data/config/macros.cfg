[gcode_macro PRINT_START]
gcode:
    # --- 1. Fetch Parameters ---
    {% set BED_TEMP = params.BED|default(110)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(250)|float %}
    {% set PURGE_TEMP = params.PURGE_TEMP|default(250)|float %}
    {% set COOL_TEMP = params.COOL_TEMP|default(150)|float %} 
    {% set CHAMBER_TEMP = params.CHAMBER|default(50)|float %}
    {% set Z_OFFSET = params.Z_OFFSET|default(0.0)|float %}

    # --- 2. Initial Setup & Heat ---
    M118 Initializing...
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0
    G90
    M140 S{BED_TEMP}
    SET_FAN_SPEED FAN=nevermore SPEED=1 
    
    M118 Initial Homing...
    G28
    
    # --- 3. Chamber Heat Soak & Convection ---
    G0 X175 Y175 Z50 F3600
    M118 Waiting for Bed Temp: {BED_TEMP}C...
    M190 S{BED_TEMP}

    {% if CHAMBER_TEMP > 0 %}
        M118 Chamber Soak: Fans at 100%...
        M106 S255                        # Turn part fans to 100%
        M118 Waiting for Chamber Temp: {CHAMBER_TEMP}C...
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={CHAMBER_TEMP}
        M106 S0                          # Turn fans back off
        M118 Chamber reached. Fans off.
    {% endif %}

    # --- 4. First Clean & Contact (Safety Temp) ---
    M118 Pre-Calibration Clean...
    CLEAN_NOZZLE HOT_TEMP={PURGE_TEMP} SAFE_TEMP={COOL_TEMP}
    
    M118 Beacon Contact (Cold)...
    G28 Z METHOD=CONTACT CALIBRATE=1 
    QUAD_GANTRY_LEVEL
    G28 Z                            

    # --- 5. Adaptive Mesh (Commented Out) ---
    # M118 Scan Mesh...
    # BED_MESH_CALIBRATE ADAPTIVE=1 RUNS=2 

    # --- 6. Final Clean & Hot Contact ---
    M118 Final Heating...
    M109 S{EXTRUDER_TEMP}
    G4 P20000                        

    M118 Final Clean...
    CLEAN_NOZZLE HOT_TEMP={EXTRUDER_TEMP}

    M118 Beacon Contact (Hot)...
    G28 Z METHOD=CONTACT CALIBRATE=0 
    
    SET_GCODE_OFFSET Z_ADJUST={Z_OFFSET} 

    # --- 7. Print! ---
    PURGE_LINE                    
    M118 Printing...

[gcode_macro PRINT_END]
gcode:
    # --- 1. Parameters & Safety ---
    M400                           # Wait for buffer to clear
    G92 E0                         # Reset extruder
    
    # --- 2. Tip Shaping Sequence ---
    # This creates a pointed tip for easier removal/reloading
    M118 Shaping Tip...
    G1 E2 F3600                    # Quick extrude to fill nozzle
    G1 E-15 F3000                  # Fast long retract to pull filament out of melt zone
    G4 P2000                       # Wait 2s for the tip to cool/solidify in the heatbreak
    G1 E10 F3000                   # Quick move back in to "crunch" any thin strings
    G1 E-15 F3000                  # Final long retract to park tip in the cold zone
    
    # --- 3. Safe Move ---
    G91                            # Relative positioning
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 12.0) %}
        {% set z_safe = 10.0 %}
    {% else %}
        {% set z_safe = max_z - act_z - 2.0 %}
    {% endif %}
    G1 Z{z_safe} F3000             

    # --- 4. Park & Shutdown ---
    G90                            # Absolute positioning
    G1 X175 Y355 F6000             # Park at Back Center
    
    M104 S0                        # Turn off hotend
    M140 S0                        # Turn off bed
    M106 S0                        # Turn off cooling fan
    
    # --- 5. Air Scrubbing ---
    M118 Scrubbing Air...
    CLEANUP_AIR

[gcode_macro CLEAN_NOZZLE]
variable_start_x: 89          
variable_start_y: 352          
variable_start_z: 3.0          
variable_wipe_dist: 30         
variable_wipe_qty: 6           
variable_wipe_spd: 8000       
variable_purge_x: 62          
variable_purge_y: 358
variable_purge_z: 10           
variable_purge_amount: 40      # Increased to 40mm

gcode:
    # --- 1. Parameters ---
    {% set hot_temp = params.HOT_TEMP|default(250)|float %}

    # --- 2. Move to Purge & THEN Heat ---
    M118 Moving to Purge Position...
    G90                             
    G1 X{purge_x} Y{purge_y} F{wipe_spd}
    G1 Z{purge_z} F1500
    
    M118 Heating to {hot_temp}C...
    M109 S{hot_temp}                
    
    # --- 3. Purge ---
    M118 Purging 40mm...
    G92 E0                          
    G1 E{purge_amount} F300         
    G1 E-2.0 F3600                  
    G4 P2000                        

    # --- 4. First Wiping Pass ---
    M118 First Wipe Pass...
    G1 X{start_x} Y{start_y} F{wipe_spd}
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} F{wipe_spd}
        G1 X{start_x} F{wipe_spd}
    {% endfor %}

    # --- 5. Reset & Second Wiping Pass ---
    M118 Second Wipe Pass...
    G1 Z{start_z + 5} F3000         
    G1 X{start_x} Y{start_y} F{wipe_spd} 
    G1 Z{start_z} F1500             
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} F{wipe_spd}
        G1 X{start_x} F{wipe_spd}
    {% endfor %}

    # --- 6. Post-Wipe Cooldown ---
    G1 Z{start_z + 20} F3000        
    
    {% if 'SAFE_TEMP' in params %}
        M118 Cooling to {params.SAFE_TEMP}C...
        M106 S255                  # Turn part fans to 100% to speed up cooling
        M109 S{params.SAFE_TEMP|float} 
        M106 S0                    # Turn part fans off
    {% else %}
        M118 Skipping cool-down...
    {% endif %}
    
    M118 Clean Complete

#[gcode_macro PURGE_LINE]
#gcode:
#    G92 E0                        # Reset Extruder
#    G1 Z2.0 F3000                 # Move Z up
#    G1 X5 Y2.5 Z0.5 F5000.0        # Move to start position
