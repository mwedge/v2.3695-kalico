[gcode_macro PRINT_START]
gcode:
    # --- 1. Fetch Parameters ---
    {% set BED_TEMP = params.BED_TEMP|default(110)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(250)|float %}
    {% set PURGE_TEMP = params.PURGE_TEMP|default(250)|float %}
    {% set COOL_TEMP = params.COOL_TEMP|default(150)|float %} 
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(50)|float %}
    {% set Z_OFFSET = params.Z_OFFSET|default(0.10)|float %}

    # --- 2. Initial Setup & Heat ---
    M118 Initializing...
    SET_FILAMENT_SENSOR SENSOR=clog_detector ENABLE=0
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0
    G90
    M140 S{BED_TEMP}
    
    # Start Chamber heating via the heater_generic logic
    {% if CHAMBER_TEMP > 0 %}
        SET_HEATER_TEMPERATURE HEATER=Chamber target={CHAMBER_TEMP}
    {% endif %}

    M118 Initial Homing...
    G28
    
    # --- 3. Chamber Heat Soak ---
    G0 X175 Y175 Z50 F3600
    M118 Waiting for Bed Temp: {BED_TEMP}C...
    M190 S{BED_TEMP}

    {% if CHAMBER_TEMP > 0 %}
        M118 Waiting for Chamber Temp: {CHAMBER_TEMP}C...
        TEMPERATURE_WAIT SENSOR="heater_generic Chamber" MINIMUM={CHAMBER_TEMP}
    {% endif %}

    NEVERMORE_PRINT_START

    # --- 4. Calibration & Cleaning ---
    M118 Pre-Calibration Cold Wipe (180C)...
    CLEAN_NOZZLE2 HOT_TEMP=180 SAFE_TEMP={COOL_TEMP} PURGE=0
    
    M118 Beacon Contact (Cold)...
    G28 Z METHOD=CONTACT CALIBRATE=1 
    QUAD_GANTRY_LEVEL
    G28 Z
    BED_MESH_CALIBRATE RUNS=2

    # --- 5. Final Prep & Purge ---
    M118 Final Prep & Purge...
    CLEAN_NOZZLE2 HOT_TEMP={EXTRUDER_TEMP} PURGE=0

    G1 X175 Y175 F18000

    M118 Beacon Contact (Hot)...
    G28 Z METHOD=CONTACT CALIBRATE=0 
    
    SET_GCODE_OFFSET Z_ADJUST={Z_OFFSET} 

    # --- 6. Print Start ---
    PRIME_LINE                    
    SET_FILAMENT_SENSOR SENSOR=clog_detector ENABLE=1
    M118 Printing...

[gcode_macro PRINT_END]
gcode:
    M118 Print Complete
    SET_FILAMENT_SENSOR SENSOR=clog_detector ENABLE=0
    CLEAR_PAUSE
    M400                           
    G92 E0                   
    
    # Safe Move
    G91                            
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 22.0) %}
        {% set z_safe = 20.0 %}
    {% else %}
        {% set z_safe = max_z - act_z - 2.0 %}
    {% endif %}
    G1 Z{z_safe} F3000             

    # Park at Back Center
    G90                            
    G1 X175 Y355 F6000      

    # Tip Shaping for Dragon Ace
    M118 Shaping Tip...
    TIP_SHAPING TEMP={printer.extruder.target}

    # Shutdown
    M104 S0                        
    M140 S0                        
    SET_HEATER_TEMPERATURE HEATER=Chamber TARGET=0
    M106 S0                        
    NEVERMORE_PRINT_END

[gcode_macro PREHEAT]
gcode:
    {% set BED_TEMP = params.BED|default(110)|float %}
    {% set CHAMBER_TEMP = params.CHAMBER|default(50)|float %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    M118 Preheating: Bed {BED_TEMP}C, Chamber {CHAMBER_TEMP}C...
    M140 S{BED_TEMP}
    
    # Activate bed fans via Chamber heater
    {% if CHAMBER_TEMP > 0 %}
        SET_HEATER_TEMPERATURE HEATER=Chamber TARGET={CHAMBER_TEMP}
    {% endif %}

    G90
    G1 X175 Y175 Z50 F6000 
    M118 Preheat Started.

[gcode_macro CLEAN_NOZZLE2]
variable_start_x: 80         
variable_start_y: 350.5      
variable_start_z: 3.65       
variable_wipe_dist: 55       
variable_wipe_qty: 3         
variable_wipe_spd: 8000
variable_purge_x: 62
variable_purge_y: 358
variable_purge_z: 10
variable_purge_amount: 40
gcode:
    {% set hot_temp = params.HOT_TEMP|default(250)|float %}
    {% set purge_enabled = params.PURGE|default(1)|int %}

    G90
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < purge_z %}
        G1 Z{purge_z} F1500
    {% endif %}
    G1 X{purge_x} Y{purge_y} F{wipe_spd}
    G1 Z{purge_z} F1500
    M109 S{hot_temp}

    {% if purge_enabled == 1 %}
        G92 E0
        G1 E{purge_amount} F300
        G1 E-6.0 F3600              
        G4 P2000
    {% endif %}

    # Phase A: Width Scrub
    M118 Phase A: Side-to-Side...
    G1 X{start_x} Y{start_y} F{wipe_spd}
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} F{wipe_spd}
        G1 Y{start_y - 3} F{wipe_spd}
        G1 X{start_x} F{wipe_spd}
        G1 Y{start_y} F{wipe_spd}
    {% endfor %}

    M118 Cooling debris (8s pause)...
    M106 S255                       
    G1 Z{start_z + 10} F3000        
    G4 P8000                        
    M106 S0                         

    # Phase B: Depth Scrub
    M118 Phase B: Front-to-Back...
    {% set mid_x = 107.5 %}           
    G1 X{mid_x} Y{start_y + 5.5} F{wipe_spd}
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 Y{start_y - 7.5} F{wipe_spd}
        G1 X{mid_x + 4} F{wipe_spd}
        G1 Y{start_y + 5.5} F{wipe_spd}
        G1 X{mid_x} F{wipe_spd}
    {% endfor %}

    # Final Flick
    G1 Z{start_z + 10} F3000        
    G4 P5000                        
    G1 X{start_x + wipe_dist} Y{start_y} F{wipe_spd}
    G1 Z{start_z} F3000               
    G1 X{start_x} F15000                             
    G1 X{start_x + wipe_dist} F15000                 

    G1 Z{start_z + 20} F3000
    {% if 'SAFE_TEMP' in params %}
        M118 Cooling to {params.SAFE_TEMP}C...
        M106 S255
        M109 S{params.SAFE_TEMP|float}
        M106 S0
    {% endif %}
    M118 Clean Complete

[gcode_macro TIP_SHAPING]
description: Filament tip shaping tuned for Dragon Ace
gcode:
    {% set TEMP = params.TEMP|default(250)|float %}
    SAVE_GCODE_STATE NAME=TIP_SHAPING_state
    {% if printer.extruder.temperature < TEMP %}
        M109 S{TEMP}
    {% endif %}

    G91
    G92 E0
    G1 E0.5 F1200                   
    G1 E-15 F3600                   
    
    # Cooling moves
    G1 E10 F2000
    G1 E-10 F2000
    G1 E8 F2000
    G1 E-8 F2000
    G1 E-10 F1200                   
    RESTORE_GCODE_STATE NAME=TIP_SHAPING_state

[gcode_macro PRIME_LINE]
gcode:
    {% set start_x = params.START_X|default(5)|float %}      
    {% set start_y = params.START_Y|default(5)|float %}      
    {% set line_length = params.LINE_LENGTH|default(60)|float %} 
    {% set purge_amount = params.PURGE_AMOUNT|default(40)|float %} 
    
    G90                               
    G1 Z5 F3000                       
    G1 X{start_x} Y{start_y} F9000
    G1 Z0.4 F1500           

    G92 E0                            
    M83                               
    G1 E10 F300
    G4 P2000
    G1 Y{start_y + line_length} E{purge_amount} F600

    G92 E0
    G1 E-0.5 F2100                    
    G1 Z3 F3000                        
    G90                               
    M400                              
    M118 Purge line complete.

[gcode_macro LOAD_FILAMENT]
gcode:
    {% set TEMP = params.TEMP|default(250)|float %}
    {% set DISTANCE = params.DISTANCE|default(100)|float %}
    {% set PURGE = params.PURGE|default(50)|float %}
    SAVE_GCODE_STATE NAME=load_state
    {% if printer.extruder.can_extrude|lower == 'false' %}
        M109 S{TEMP}
    {% endif %}
    G91
    G92 E0
    G1 E{DISTANCE} F2000 
    G1 E{PURGE} F300
    M400 
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set TEMP = params.TEMP|default(250)|float %}
    {% set DISTANCE = params.DISTANCE|default(100)|float %}
    SAVE_GCODE_STATE NAME=unload_state
    {% if printer.extruder.can_extrude|lower == 'false' %}
        M109 S{TEMP}
    {% endif %}
    TIP_SHAPING TEMP={TEMP}
    G91
    G1 E-{DISTANCE} F3000
    M400 
    RESTORE_GCODE_STATE NAME=unload_state
