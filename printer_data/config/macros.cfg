[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}

    M118 Initializing...
    BED_MESH_CLEAR
    G28
    M190 S{BED_TEMP}              # Wait for bed

    # --- THE MAGIC STEP ---
    # This homes (if needed), heats to 250, purges, wipes while cooling, 
    # and only returns once the nozzle is at 150C.
    CLEAN_NOZZLE                  

    M118 Leveling Gantry...
    QUAD_GANTRY_LEVEL
    G28 Z                         

    M118 Calibrating Z...
    BEACON_AUTO_CALIBRATE         # Safe: Nozzle is clean and 150C

    M118 Heating to Print Temp
    M109 S{EXTRUDER_TEMP}         # Heat to final print temp

    M118 Meshing...
    BED_MESH_CALIBRATE ADAPTIVE=1 

    M118 Purging
    PURGE_LINE

[gcode_macro PRINT_END]
gcode:
    # --- 1. Parameters & Safety ---
    M400                           # Wait for buffer to clear
    G92 E0                         # Reset extruder
    
    # --- 2. Tip Shaping Sequence ---
    # This creates a pointed tip for easier removal/reloading
    M118 Shaping Tip...
    G1 E2 F3600                    # Quick extrude to fill nozzle
    G1 E-15 F3000                  # Fast long retract to pull filament out of melt zone
    G4 P2000                       # Wait 2s for the tip to cool/solidify in the heatbreak
    G1 E10 F3000                   # Quick move back in to "crunch" any thin strings
    G1 E-15 F3000                  # Final long retract to park tip in the cold zone
    
    # --- 3. Safe Move ---
    G91                            # Relative positioning
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 12.0) %}
        {% set z_safe = 10.0 %}
    {% else %}
        {% set z_safe = max_z - act_z - 2.0 %}
    {% endif %}
    G1 Z{z_safe} F3000             

    # --- 4. Park & Shutdown ---
    G90                            # Absolute positioning
    G1 X175 Y355 F6000             # Park at Back Center
    
    M104 S0                        # Turn off hotend
    M140 S0                        # Turn off bed
    M106 S0                        # Turn off cooling fan
    
    # --- 5. Air Scrubbing ---
    M118 Scrubbing Air...
    CLEANUP_AIR


[gcode_macro CLEAN_NOZZLE]
# --- Brush Settings ---
variable_start_x: 89          
variable_start_y: 352          
variable_start_z: 3.0          
variable_wipe_dist: 30         
variable_wipe_qty: 6           
variable_wipe_spd: 8000       
variable_raise_distance: 20    

# --- Purge Bucket Settings ---
variable_purge_x: 62          
variable_purge_y: 358
variable_purge_z: 10           
variable_purge_amount: 15      

# --- Temperature Settings ---
variable_hot_temp: 250         # Temp for the heavy purge
variable_safe_temp: 150        # Safe temp for Beacon Contact

gcode:
    # 1. Safety Check: Is the printer homed?
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # 2. Heat to Hot Temp for Purge
    M118 Purging at {hot_temp}C...
    M109 S{hot_temp}                # Wait for 250C (using MPC)

    G90                             # Absolute positioning

    # 3. The Purge
    G1 X{purge_x} Y{purge_y} F{wipe_spd}   
    G1 Z{purge_z} F1500                    
    G92 E0                                 
    G1 E{purge_amount} F300                
    G1 E-2.0 F3600                         # Retract more to prevent ooze while cooling
    G4 P2000                               

    # --- 3. First Wiping Pass ---
    M118 First Wipe Pass...
    G1 X{start_x} Y{start_y} F{wipe_spd}
    G1 Z{start_z} F1500
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} F{wipe_spd}
        G1 X{start_x} F{wipe_spd}
    {% endfor %}

    # --- 4. Reset & Second Wiping Pass ---
    M118 Second Wipe Pass...
    G1 Z{start_z + 5} F3000         
    G1 X{start_x} Y{start_y} F{wipe_spd} 
    G1 Z{start_z} F1500             
    {% for wipes in range(1, (wipe_qty + 1)) %}
        G1 X{start_x + wipe_dist} F{wipe_spd}
        G1 X{start_x} F{wipe_spd}
    {% endfor %}

    # 4. Initiate Controlled Cool-down
    # We set the target to 150C but DO NOT M109 wait yet.
    M104 S{safe_temp}                      

    # 6. Post-Wipe Raise and Move to Center
    G1 Z{start_z + raise_distance} F3000
    G1 X175 Y175 F10000                            

    # 7. Final Safety Gate for Beacon
    # Macro stops here and waits until nozzle is exactly 150C.
    M118 Cooling to {safe_temp}C...
    M109 S{safe_temp}                              
    M118 Nozzle Clean & Safe.

[gcode_macro PURGE_LINE]
gcode:
    G92 E0                        # Reset Extruder
    G1 Z2.0 F3000                 # Move Z up
    G1 X5 Y2.5 Z0.3 F5000.0        # Move to start position
    G1 X45 Y2.5 Z0.3 F300.0 E15  # Draw first line
    G92 E0                        # Reset Extruder
    G1 Z2.0 F3000                 # Move Z up

[gcode_macro CLEANUP_AIR]
gcode:
    # This macro keeps the Nevermore running until the bed is safe
    SET_FAN_SPEED FAN=nevermore SPEED=1
    
    # Wait until the bed temperature drops below 60C
    # This prevents the "VOC bloom" when you open the door.
    TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM=60
    
    SET_FAN_SPEED FAN=nevermore SPEED=0
    M118 Bed Cool. Print Finished.

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  50         # Distance from extruder gears to melt zone
variable_purge_distance: 30         # Amount to purge to clear old color
variable_load_speed:     1800       # Fast feed speed (30mm/s)
variable_purge_speed:    300        # Slow purge speed (5mm/s)

gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}
    
    SAVE_GCODE_STATE NAME=load_state
    M118 Loading Filament...
    
    # 1. Heat up if necessary
    {% if printer.extruder.temperature < 200 %}
        M118 Heating to {EXTRUDER_TEMP}C...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 2. The Load Sequence
    G91                             # Relative positioning
    G92 E0                          # Reset extruder
    
    # Rapid feed through the heatbreak
    M118 Feeding...
    G1 E{load_distance} F{load_speed} 
    
    # Slow purge to prime the nozzle
    M118 Purging...
    G1 E{purge_distance} F{purge_speed}
    
    # Small retract to prevent ooze after loading
    G1 E-1 F3000
    
    G90                             # Absolute positioning
    RESTORE_GCODE_STATE NAME=load_state
    M118 Load Complete
    UPDATE_DELAYED_GCODE ID=clear_display DURATION=5

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}
    
    SAVE_GCODE_STATE NAME=unload_state
    
    # 1. Heat up if necessary
    {% if printer.extruder.temperature < 200 %}
        M118 Heating to {EXTRUDER_TEMP}C...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 2. Tip Shaping & Unload
    # This mirrors your PRINT_END logic for a clean point
    M118 Shaping Tip...
    G91
    G1 E2 F3600                     # Dump
    G1 E-15 F3000                   # Fast pull
    G4 P2000                        # Cool
    G1 E10 F3000                    # Crunch
    G1 E-80 F3000                   # Long retract to clear gears
    
    G90
    RESTORE_GCODE_STATE NAME=unload_state
    M118 Unload Complete

[delayed_gcode clear_display]
gcode:
    M118
