#####################################################################
# 	NEVERMORE MAX 2 - SMART AUTOMATION MACROS
#####################################################################

[gcode_macro _NEVERMORE_VARS]
variable_threshold_low: 150       # Fan at 40% (Initial VOC rise)
variable_threshold_high: 300      # Fan at 100% (Heavy printing)
variable_target_safe_voc: 100     # VOC level considered "Safe" to stop fan
variable_refresh_time: 5          # Seconds between monitoring checks
gcode:
    # No-op

#####################################################################
# 	AUTO-MONITORING (DURING PRINT)
#####################################################################

[delayed_gcode NEVERMORE_MONITOR]
initial_duration: 5
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %}
    {% set voc = printer["temperature_sensor MAX_IN_SGP"].temperature | int %}
    
    # Do not interrupt if we are in the middle of a "Smart Scrub"
    {% if printer["delayed_gcode _SCRUB_LOOP"].initial_duration == 0 %}
        {% if voc >= vars.threshold_high %}
            SET_FAN_SPEED FAN=nevermore_max SPEED=1.0
            _SET_NEVERMORE_LEDS_BY_VOC VOC={voc}
        {% elif voc >= vars.threshold_low %}
            SET_FAN_SPEED FAN=nevermore_max SPEED=0.4
            _SET_NEVERMORE_LEDS_BY_VOC VOC={voc}
        {% else %}
            # Ambient/Idle state
            {% if printer.idle_timeout.state == "Printing" %}
                SET_FAN_SPEED FAN=nevermore_max SPEED=0.2 # Keep air moving
            {% else %}
                SET_FAN_SPEED FAN=nevermore_max SPEED=0.0
            {% endif %}
            _SET_NEVERMORE_LEDS_BY_VOC VOC={voc}
        {% endif %}
    {% endif %}

    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION={vars.refresh_time}

#####################################################################
# 	ADAPTIVE SCRUB (POST-PRINT)
#####################################################################

[gcode_macro NEVERMORE_ADAPTIVE_SCRUB]
description: Runs the fan until VOCs are below a safe threshold
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %}
    {% set current_voc = printer["temperature_sensor MAX_IN_SGP"].temperature | int %}
    
    _SET_NEVERMORE_LEDS_BY_VOC VOC={current_voc}

    {% if current_voc > vars.target_safe_voc %}
        M117 Scrubbing: VOC {current_voc} > {vars.target_safe_voc}
        SET_FAN_SPEED FAN=nevermore_max SPEED=1.0
        UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=30
    {% else %}
        M117 Air Clean (VOC {current_voc}).
        SET_FAN_SPEED FAN=nevermore_max SPEED=0.0
        _SET_NEVERMORE_LEDS_BY_VOC VOC={current_voc} # Will set to Green
    {% endif %}

[delayed_gcode _SCRUB_LOOP]
gcode:
    NEVERMORE_ADAPTIVE_SCRUB

#####################################################################
# 	LED LOGIC (16 PIXELS)
#####################################################################

[gcode_macro _SET_NEVERMORE_LEDS_BY_VOC]
gcode:
    {% set voc = params.VOC|default(0)|int %}
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %}
    
    {% if voc >= vars.threshold_high %}
        # Dirty - Pulse Red
        SET_LED LED=Nevermore_LED RED=1 GREEN=0 BLUE=0 
    {% elif voc >= vars.threshold_low %}
        # Cleaning - Orange/Yellow
        SET_LED LED=Nevermore_LED RED=0.8 GREEN=0.3 BLUE=0
    {% else %}
        # Safe - Solid Green
        SET_LED LED=Nevermore_LED RED=0 GREEN=0.5 BLUE=0
    {% endif %}

#####################################################################
# 	INTEGRATION HELPERS
#####################################################################

# CALL THIS IN YOUR PRINT_END MACRO
[gcode_macro NEVERMORE_PRINT_END]
gcode:
    M117 Starting Smart Scrub...
    NEVERMORE_ADAPTIVE_SCRUB

# CALL THIS IN YOUR PRINT_START MACRO
[gcode_macro NEVERMORE_PRINT_START]
gcode:
    # Ensure monitoring is active
    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION=1
    # Ensure scrub loop is stopped
    UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=0
