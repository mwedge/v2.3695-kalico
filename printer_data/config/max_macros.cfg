#####################################################################
# 	NEVERMORE MAX 2 - SMART AUTOMATION & GRANULAR FUEL GAUGE
#####################################################################

[gcode_macro _NEVERMORE_VARS]
# --- Fan Speed Thresholds ---
variable_threshold_low: 150       # VOC level to kick fan to 40% [cite: 1]
variable_threshold_high: 300      # VOC level to kick fan to 100% [cite: 1]
variable_target_safe_voc: 100     # VOC level to stop fan after print [cite: 1]
variable_refresh_time: 5          # Seconds between monitoring checks [cite: 1]

# --- Carbon Efficiency Calibration (0.0 to 1.0) ---
variable_eff_max: 0.90            # 90% reduction = All 16 LEDs Green (Fresh) [cite: 2]
variable_eff_min: 0.15            # 15% reduction = All 16 LEDs Red (Spent) [cite: 2]

gcode:
    # No-op

#####################################################################
# 	CORE MONITORING LOOP
#####################################################################

[delayed_gcode NEVERMORE_MONITOR]
initial_duration: 5 [cite: 3]
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %} [cite: 3]
    {% set intake = printer["sgp40 Max_SGP_In"].gas | int %} [cite: 3]
    
    # 1. HANDLE FAN SPEED (If not in a dedicated Post-Print Scrub)
    {% if printer["delayed_gcode _SCRUB_LOOP"].initial_duration == 0 %} [cite: 4]
        {% if intake >= vars.threshold_high %} [cite: 4]
            SET_FAN_SPEED FAN=nevermore_max SPEED=1.0 [cite: 4]
        {% elif intake >= vars.threshold_low %} [cite: 4]
            SET_FAN_SPEED FAN=nevermore_max SPEED=0.4 [cite: 4]
        {% else %} [cite: 4]
            {% if printer.idle_timeout.state == "Printing" %} [cite: 4]
                SET_FAN_SPEED FAN=nevermore_max SPEED=0.2 [cite: 4]
            {% else %} [cite: 4]
                SET_FAN_SPEED FAN=nevermore_max SPEED=0.0 [cite: 4]
            {% endif %} [cite: 4]
        {% endif %} [cite: 5]
    {% endif %}

    # 2. UPDATE FUEL GAUGE
    {% if intake > 30 %} [cite: 5]
        NEVERMORE_FUEL_GAUGE [cite: 5]
    {% else %} [cite: 5]
        # Clean air state: All LEDs Dim Green (Ready)
        SET_LED LED=Nevermore_LED RED=0 GREEN=0.1 BLUE=0 [cite: 5]
    {% endif %}

    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION={vars.refresh_time} [cite: 5]

#####################################################################
# 	GRANULAR 1-BY-1 FUEL GAUGE
#####################################################################

[gcode_macro NEVERMORE_FUEL_GAUGE]
description: Maps efficiency to 16 LEDs, incrementing one at a time [cite: 6]
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %} [cite: 6]
    {% set intake = printer["sgp40 Max_SGP_In"].gas | float %} [cite: 7]
    {% set exhaust = printer["sgp40 Max_SGP_Out"].gas | float %} [cite: 8]
    
    # 1. Calculate Raw Efficiency
    {% if intake > 20 %} [cite: 9]
        {% set raw_eff = (1.0 - (exhaust / intake)) %} [cite: 9]
    {% else %} [cite: 9]
        {% set raw_eff = vars.eff_max %} [cite: 9]
    {% endif %}

    # 2. Scale efficiency to 0.0-1.0 range based on your Min/Max
    {% set scaled_eff = (raw_eff - vars.eff_min) / (vars.eff_max - vars.eff_min) %} [cite: 9]
    {% set scaled_eff = [1.0, [0.0, scaled_eff]|max]|min %} [cite: 9]
    
    # 3. Calculate exactly how many LEDs stay Green (0 to 16)
    {% set green_count = ((scaled_eff * 16) + 0.5) | int %} [cite: 10]

    # 4. Loop through every LED individually to set color
    {% for i in range(16) %} [cite: 11]
        {% set pixel_index = i + 1 %} [cite: 11]
        {% if pixel_index <= green_count %} [cite: 11]
            SET_LED LED=Nevermore_LED RED=0 GREEN=0.3 BLUE=0 INDEX={pixel_index} TRANSMIT=0 [cite: 11]
        {% else %} [cite: 11]
            SET_LED LED=Nevermore_LED RED=0.5 GREEN=0 BLUE=0 INDEX={pixel_index} TRANSMIT=0 [cite: 11]
        {% endif %} [cite: 11]
    {% endfor %}
    
    # 5. Push the batch update to the hardware
    SET_LED LED=Nevermore_LED RED=0 GREEN=0 BLUE=0 INDEX=1 TRANSMIT=1 [cite: 11]

#####################################################################
# 	ADAPTIVE POST-PRINT SCRUB
#####################################################################

[gcode_macro NEVERMORE_ADAPTIVE_SCRUB]
description: Fan runs at 100% until VOCs drop below target [cite: 12]
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %} [cite: 12]
    {% set intake = printer["sgp40 Max_SGP_In"].gas | int %} [cite: 13]
    
    {% if intake > vars.target_safe_voc %} [cite: 13]
        M117 Scrubbing: VOC {intake} > {vars.target_safe_voc} [cite: 13]
        SET_FAN_SPEED FAN=nevermore_max SPEED=1.0 [cite: 13]
        NEVERMORE_FUEL_GAUGE [cite: 13]
        UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=30 [cite: 13]
    {% else %} [cite: 14]
        M117 Air Clean. Nevermore Idle. [cite: 14]
        SET_FAN_SPEED FAN=nevermore_max SPEED=0.0 [cite: 14]
        SET_LED LED=Nevermore_LED RED=0 GREEN=0.1 BLUE=0 [cite: 14]
    {% endif %}

[delayed_gcode _SCRUB_LOOP]
gcode:
    NEVERMORE_ADAPTIVE_SCRUB

#####################################################################
# 	INTEGRATION & STATUS HELPERS
#####################################################################

[gcode_macro NEVERMORE_STATUS]
description: Prints current VOC levels and fan speed to console
gcode:
    {% set intake = printer["sgp40 Max_SGP_In"].gas %}
    {% set exhaust = printer["sgp40 Max_SGP_Out"].gas %}
    { action_respond_info("Nevermore Status:
                           Intake VOC: %d
                           Exhaust VOC: %d" % (intake, exhaust)) }

[gcode_macro NEVERMORE_PRINT_START]
description: Call this in your PRINT_START macro
gcode:
    UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=0
    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION=1

[gcode_macro NEVERMORE_PRINT_END]
description: Call this in your PRINT_END macro
gcode:
    M117 Starting Smart Scrub...
    NEVERMORE_ADAPTIVE_SCRUB

[gcode_macro DEBUG_SGP40]
description: Dumps all available attributes for the SGP40 sensor to the console [cite: 15]
gcode:
    {% set sensor_name = "sgp40 Max_SGP_In" %} [cite: 15]
    {% if sensor_name in printer %} [cite: 15]
        { action_respond_info("--- DEBUGGING %s ---" % sensor_name) } [cite: 15]
        {% for key, value in printer[sensor_name].items() %} [cite: 15]
            { action_respond_info("%s : %s" % (key, value)) } [cite: 15]
        {% endfor %} [cite: 15]
        { action_respond_info("--- END DEBUG ---") } [cite: 15]
    {% else %} [cite: 15]
        { action_respond_info("ERROR: Sensor '%s' not found in printer object." % sensor_name) } [cite: 15]
    {% endif %}
