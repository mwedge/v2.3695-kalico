#####################################################################
# 	NEVERMORE MAX 2 - SMART AUTOMATION (DYNAMIC SCALING)
#####################################################################

[gcode_macro _NEVERMORE_VARS]
variable_threshold_low: 150       # Fan starts scaling here (33%)
variable_threshold_high: 450      # Fan reaches 100% here
variable_target_safe_voc: 100     
variable_refresh_time: 5          
variable_eff_max: 0.90            
variable_eff_min: 0.15            
gcode:
    # No-op

#####################################################################
# 	CORE MONITORING LOOP (DYNAMIC)
#####################################################################

[delayed_gcode NEVERMORE_MONITOR]
initial_duration: 0
gcode:
    {% set t_high = printer["gcode_macro _NEVERMORE_VARS"].threshold_high | float %}
    {% set t_low = printer["gcode_macro _NEVERMORE_VARS"].threshold_low | float %}
    {% set refresh = printer["gcode_macro _NEVERMORE_VARS"].refresh_time | int %}
    {% set intake = printer["sgp40 Max_SGP_In"].gas | float %}

    # 1. CALCULATE DYNAMIC SPEED
    {% if intake >= t_high %}
        {% set final_speed = 1.0 %}
    {% elif intake <= t_low %}
        {% if printer.idle_timeout.state == "Printing" %}
            {% set final_speed = 0.2 %}
        {% else %}
            {% set final_speed = 0.0 %}
        {% endif %}
    {% else %}
        # Linear scaling between 0.33 (at low threshold) and 1.0 (at high threshold)
        {% set ratio = (intake - t_low) / (t_high - t_low) %}
        {% set final_speed = 0.33 + (ratio * 0.67) %}
    {% endif %}

    # 2. APPLY SPEED & DEBUG
#    RESPOND MSG="NEVERMORE: Intake={intake|int} | Speed={ (final_speed * 100)|int }%"
    SET_FAN_SPEED FAN=nevermore_max SPEED={final_speed}

    # 3. UPDATE REMAINING SYSTEMS
    NEVERMORE_FUEL_GAUGE
    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION={refresh}

#####################################################################
# 	FUEL GAUGE & SCRUBBING
#####################################################################

[gcode_macro NEVERMORE_FUEL_GAUGE]
gcode:
    {% set eff_max = printer["gcode_macro _NEVERMORE_VARS"].eff_max | float %}
    {% set eff_min = printer["gcode_macro _NEVERMORE_VARS"].eff_min | float %}
    {% set intake = printer["sgp40 Max_SGP_In"].gas | float %}
    {% set exhaust = printer["sgp40 Max_SGP_Out"].gas | float %}
    
    {% if intake > 20 %}
        {% set raw_eff = (1.0 - (exhaust / intake)) %}
    {% else %}
        {% set raw_eff = eff_max %}
    {% endif %}

    {% set scaled_eff = (raw_eff - eff_min) / (eff_max - eff_min) %}
    {% set scaled_eff = [1.0, [0.0, scaled_eff]|max]|min %}
    {% set green_count = ((scaled_eff * 16) + 0.5) | int %}

    {% for i in range(16) %}
        {% set pixel_index = i + 1 %}
        {% if pixel_index <= green_count %}
            SET_LED LED=Nevermore_LED RED=0 GREEN=0.3 BLUE=0 INDEX={pixel_index} TRANSMIT=0
        {% else %}
            SET_LED LED=Nevermore_LED RED=0.5 GREEN=0 BLUE=0 INDEX={pixel_index} TRANSMIT=0
        {% endif %}
    {% endfor %}
    SET_LED LED=Nevermore_LED RED=0 GREEN=0 BLUE=0 INDEX=1 TRANSMIT=1

[gcode_macro NEVERMORE_ADAPTIVE_SCRUB]
gcode:
    {% set target_safe_voc = printer["gcode_macro _NEVERMORE_VARS"].target_safe_voc | int %}
    {% set intake = printer["sgp40 Max_SGP_In"].gas | int %}
    
    {% if intake > target_safe_voc %}
        SET_FAN_SPEED FAN=nevermore_max SPEED=1.0
        NEVERMORE_FUEL_GAUGE
        UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=30
    {% else %}
        SET_FAN_SPEED FAN=nevermore_max SPEED=0.0
        SET_LED LED=Nevermore_LED RED=0 GREEN=0.1 BLUE=0
        UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION=1
    {% endif %}

[delayed_gcode _SCRUB_LOOP]
gcode:
    NEVERMORE_ADAPTIVE_SCRUB

#####################################################################
# 	HELPERS
#####################################################################

[gcode_macro NEVERMORE_PRINT_START]
gcode:
    UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=0
    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION=1

[gcode_macro NEVERMORE_PRINT_END]
gcode:
    NEVERMORE_ADAPTIVE_SCRUB

[gcode_macro NEVERMORE_STATUS]
gcode:
    {% set intake = printer["sgp40 Max_SGP_In"].gas %}
    {% set exhaust = printer["sgp40 Max_SGP_Out"].gas %}
    { action_respond_info("Intake: %d | Exhaust: %d" % (intake, exhaust)) }
