#####################################################################
# 	NEVERMORE MAX 2 - SMART AUTOMATION & FUEL GAUGE
#####################################################################

[gcode_macro _NEVERMORE_VARS]
# --- Fan Speed Thresholds ---
variable_threshold_low: 150       # VOC level to kick fan to 40%
variable_threshold_high: 300      # VOC level to kick fan to 100%
variable_target_safe_voc: 100     # VOC level to stop fan after print
variable_refresh_time: 5          # Seconds between monitoring checks

# --- Carbon Efficiency Calibration (0.0 to 1.0) ---
variable_eff_max: 0.90            # 90% reduction = 16 Green LEDs (Fresh)
variable_eff_min: 0.15            # 15% reduction = 16 Red LEDs (Spent)

gcode:
    # No-op

#####################################################################
# 	CORE MONITORING LOOP
#####################################################################

[delayed_gcode NEVERMORE_MONITOR]
initial_duration: 5
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %}
    {% set intake = printer["temperature_sensor MAX_IN_SGP"].temperature | int %}
    
    # 1. HANDLE FAN SPEED (If not in a dedicated Scrub loop)
    {% if printer["delayed_gcode _SCRUB_LOOP"].initial_duration == 0 %}
        {% if intake >= vars.threshold_high %}
            SET_FAN_SPEED FAN=nevermore_max SPEED=1.0
        {% elif intake >= vars.threshold_low %}
            SET_FAN_SPEED FAN=nevermore_max SPEED=0.4
        {% else %}
            {% if printer.idle_timeout.state == "Printing" %}
                SET_FAN_SPEED FAN=nevermore_max SPEED=0.2
            {% else %}
                SET_FAN_SPEED FAN=nevermore_max SPEED=0.0
            {% endif %}
        {% endif %}
    {% endif %}

    # 2. UPDATE FUEL GAUGE (Only if there are enough VOCs to measure)
    {% if intake > 30 %}
        NEVERMORE_FUEL_GAUGE
    {% else %}
        # Default to a "Ready" state (Dim Green) if air is clean
        SET_LED LED=Nevermore_LED RED=0 GREEN=0.1 BLUE=0
    {% endif %}

    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION={vars.refresh_time}

#####################################################################
# 	GRANULAR FUEL GAUGE (16 SEGMENTS)
#####################################################################

[gcode_macro NEVERMORE_FUEL_GAUGE]
description: Maps filtration efficiency to 16 LEDs (Green to Red)
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %}
    {% set intake = printer["temperature_sensor MAX_IN_SGP"].temperature | float %}
    {% set exhaust = printer["temperature_sensor MAX_OUT_SGP"].temperature | float %}
    
    # Calculate Raw Efficiency
    {% if intake > 20 %}
        {% set raw_eff = (1.0 - (exhaust / intake)) %}
    {% else %}
        {% set raw_eff = vars.eff_max %}
    {% endif %}

    # Scale efficiency to a 0.0 - 1.0 range based on your Min/Max vars
    {% set scaled_eff = (raw_eff - vars.eff_min) / (vars.eff_max - vars.eff_min) %}
    {% set scaled_eff = [1.0, [0.0, scaled_eff]|max]|min %}
    
    # Determine how many segments are "Efficient" (Green)
    {% set green_count = (scaled_eff * 16) | int %}

    {% for i in range(16) %}
        {% if i < green_count %}
            # Segment is filtering well
            SET_LED LED=Nevermore_LED RED=0 GREEN=0.3 BLUE=0 INDEX={i + 1} TRANSMIT=0
        {% else %}
            # Segment is saturated
            SET_LED LED=Nevermore_LED RED=0.5 GREEN=0 BLUE=0 INDEX={i + 1} TRANSMIT=0
        {% endif %}
    {% endfor %}
    
    # Final transmit to update the strip
    SET_LED LED=Nevermore_LED RED=0 GREEN=0 BLUE=0 INDEX=1 TRANSMIT=1

#####################################################################
# 	POST-PRINT SMART SCRUB
#####################################################################

[gcode_macro NEVERMORE_ADAPTIVE_SCRUB]
gcode:
    {% set vars = printer["gcode_macro _NEVERMORE_VARS"] %}
    {% set intake = printer["temperature_sensor MAX_IN_SGP"].temperature | int %}
    
    {% if intake > vars.target_safe_voc %}
        M117 Scrubbing: VOC {intake} > {vars.target_safe_voc}
        SET_FAN_SPEED FAN=nevermore_max SPEED=1.0
        NEVERMORE_FUEL_GAUGE
        UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=30
    {% else %}
        M117 Air Clean. Nevermore Idle.
        SET_FAN_SPEED FAN=nevermore_max SPEED=0.0
        SET_LED LED=Nevermore_LED RED=0 GREEN=0.2 BLUE=0 # Solid dim green
    {% endif %}

[delayed_gcode _SCRUB_LOOP]
gcode:
    NEVERMORE_ADAPTIVE_SCRUB

#####################################################################
# 	PRINTER INTEGRATION
#####################################################################

[gcode_macro NEVERMORE_PRINT_START]
description: Call this in your PRINT_START macro
gcode:
    UPDATE_DELAYED_GCODE ID=_SCRUB_LOOP DURATION=0 # Cancel any active scrub
    UPDATE_DELAYED_GCODE ID=NEVERMORE_MONITOR DURATION=1

[gcode_macro NEVERMORE_PRINT_END]
description: Call this in your PRINT_END macro
gcode:
    NEVERMORE_ADAPTIVE_SCRUB

[gcode_macro TEST_NEVERMORE_LEDS]
description: Lights up LEDs one by one to find Pixel 1
gcode:
    # Clear all LEDs first
    SET_LED LED=Nevermore_LED RED=0 GREEN=0 BLUE=0 TRANSMIT=1
    G4 P500 # Wait 0.5s
    
    # Loop through all 16 pixels
    {% for i in range(16) %}
        M117 Testing LED Index: {i + 1}
        # Light up the current pixel Blue
        SET_LED LED=Nevermore_LED RED=0 GREEN=0 BLUE=1 INDEX={i + 1} TRANSMIT=1
        G4 P500 # Pause for half a second to let you see it
        # Turn it back off before the next one
        SET_LED LED=Nevermore_LED RED=0 GREEN=0 BLUE=0 INDEX={i + 1} TRANSMIT=1
    {% endfor %}
    
    M117 LED Test Complete
